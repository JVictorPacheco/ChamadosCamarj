services:
  postgres:
    image: postgres:16-alpine
    container_name: chamados-postgres
    environment:
      POSTGRES_DB: chamadoscamarj
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chamados-network

volumes:
  postgres_data:

networks:
  chamados-network:
    driver: bridge
